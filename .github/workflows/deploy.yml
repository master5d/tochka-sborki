name: Deploy to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'hub/**'
      - 'mentor/**'
      - 'workers/**'
      - '.github/workflows/deploy.yml'

jobs:
  # ── ai.mamaev.coach (course) ──────────────────────────────
  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 252b28b0ef2e1866c532e2622060c809
        run: npx wrangler pages deploy web/out --project-name=tochka-sborki --branch=main

  # ── mamaev.coach (landing hub) ────────────────────────────
  deploy-hub:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hub/package-lock.json
      - name: Install
        working-directory: hub
        run: npm ci
      - name: Build
        working-directory: hub
        run: npm run build
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 252b28b0ef2e1866c532e2622060c809
        run: npx wrangler pages deploy hub/out --project-name=mamaev-coach-hub --branch=main

  # ── mentor.mamaev.coach (B2B one-pager) ───────────────────
  deploy-mentor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mentor/package-lock.json
      - name: Install
        working-directory: mentor
        run: npm ci
      - name: Build
        working-directory: mentor
        run: npm run build
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 252b28b0ef2e1866c532e2622060c809
        run: npx wrangler pages deploy mentor/out --project-name=mamaev-coach-mentor --branch=main

  # ── workers (auth API) ────────────────────────────────────
  deploy-workers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json
      - name: Install
        working-directory: workers
        run: npm ci
      - name: Deploy
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 252b28b0ef2e1866c532e2622060c809
        run: npx wrangler deploy
